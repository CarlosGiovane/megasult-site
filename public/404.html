<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Página não encontrada — Megasult</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font: 15px/1.5 system-ui, -apple-system, sans-serif; background: #fafafa; color: #111; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1.5rem; }
      .card { max-width: 28rem; width: 100%; text-align: center; padding: 2rem; }
      h1 { font-size: 2.5rem; margin: 0 0 0.5rem; }
      h2 { font-size: 1.1rem; margin: 0 0 0.5rem; }
      p { color: #4b5563; margin: 0 0 1.5rem; }
      a { display: inline-flex; padding: 0.5rem 1.25rem; border-radius: 0.375rem; font: inherit; text-decoration: none; background: #1a3270; color: #fff; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404</h1>
      <h2>Página não encontrada</h2>
      <p>A página que você procura não existe ou foi movida.</p>
      <a href="/">Voltar ao início</a>
    </div>
  </body>
</html>
